<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Dazarus — Intelligent Product Prototyping</title>
    <meta
      name="description"
      content="Dazarus builds AI-enabled digital products and prototypes across software, robotics, embedded systems, and modern web platforms."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Dazarus — Intelligent Product Prototyping" />
    <meta
      property="og:description"
      content="Dazarus builds AI-enabled digital products and prototypes across software, robotics, embedded systems, and modern web platforms."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dazarus.com" />
    <meta property="og:image" content="https://dazarus.com/preview.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dazarus — Intelligent Product Prototyping" />
    <meta
      name="twitter:description"
      content="Dazarus builds AI-enabled digital products and prototypes across software, robotics, embedded systems, and modern web platforms."
    />
    <meta name="twitter:image" content="https://dazarus.com/preview.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Hidden static form for Netlify build-time form detection -->
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
